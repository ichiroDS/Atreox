<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATREOX AI — Course Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nav-h: 54px;
      --sidebar-w: 308px;
      --bg: #0b0b0d;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      --text: #fff;
      --text-dim: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.28);
      --accent: #5b8df8;
      --accent-dim: rgba(91,141,248,0.12);
      --accent-border: rgba(91,141,248,0.28);
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.10);
      --green-border: rgba(52,211,153,0.25);
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 300; }

    /* ─── GATE ─────────────────────────────── */
    #gate {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .gate-card {
      max-width: 440px; width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 28px;
      padding: 56px 44px;
      text-align: center;
      backdrop-filter: blur(40px);
    }
    .gate-lock {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .gate-card h2 {
      font-family: 'Instrument Serif', serif; font-style: italic;
      font-size: 1.9rem; color: var(--text); margin-bottom: 10px;
    }
    .gate-card p { font-size: 0.9rem; color: var(--text-dim); line-height: 1.65; margin-bottom: 32px; }
    .gate-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 30px; border-radius: 9999px;
      background: rgba(91,141,248,0.12);
      border: 1px solid var(--accent-border);
      color: var(--text);
      font-family: 'Barlow', sans-serif; font-weight: 500; font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .gate-btn:hover { background: rgba(91,141,248,0.22); transform: translateY(-2px); }

    /* ─── APP SHELL ─────────────────────────── */
    #app { display: none; height: 100vh; flex-direction: column; }

    /* ─── TOP NAV ───────────────────────────── */
    #topnav {
      height: var(--nav-h); flex-shrink: 0;
      display: flex; align-items: center; gap: 14px;
      padding: 0 18px 0 20px;
      background: rgba(11,11,13,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 50;
    }
    .nav-back {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-dim); font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.06em; text-decoration: none;
      transition: color 0.18s; white-space: nowrap; flex-shrink: 0;
    }
    .nav-back:hover { color: var(--text); }
    .nav-sep { width: 1px; height: 18px; background: var(--border-strong); flex-shrink: 0; }
    .nav-title {
      font-size: 0.82rem; font-weight: 400; color: var(--text-dim);
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .progress-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 9999px;
      background: var(--green-dim); border: 1px solid var(--green-border);
      font-size: 0.72rem; font-weight: 500; color: var(--green);
      white-space: nowrap;
    }
    #nav-user { font-size: 0.78rem; color: var(--text-muted); }
    #mobile-toggle {
      display: none;
      align-items: center; gap: 6px;
      padding: 6px 13px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border-strong);
      color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.78rem;
      cursor: pointer;
    }

    /* ─── MAIN ROW ──────────────────────────── */
    #main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ─── CONTENT (left) ───────────────────── */
    #content { flex: 1; overflow-y: auto; min-width: 0; }
    #content::-webkit-scrollbar { width: 4px; }
    #content::-webkit-scrollbar-track { background: transparent; }
    #content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 9999px; }

    /* Video */
    #video-wrap {
      width: 100%; aspect-ratio: 16/9;
      background: #000; position: relative;
      border-bottom: 1px solid var(--border);
    }
    #video-player { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    /* Lesson nav row */
    #lesson-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px 0; gap: 10px;
    }
    .nav-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 9999px;
      background: var(--surface); border: 1px solid var(--border-strong);
      color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 400; font-size: 0.8rem;
      cursor: pointer; transition: background 0.18s, transform 0.18s;
    }
    .nav-pill:hover:not(:disabled) { background: var(--surface-hover); transform: translateY(-1px); }
    .nav-pill:disabled { opacity: 0.28; cursor: default; }
    .complete-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 20px; border-radius: 9999px;
      background: var(--green-dim); border: 1px solid var(--green-border);
      color: var(--green); font-family: 'Barlow', sans-serif; font-weight: 500; font-size: 0.8rem;
      cursor: pointer; transition: background 0.18s, transform 0.18s;
    }
    .complete-pill:hover { background: rgba(52,211,153,0.16); transform: translateY(-1px); }
    .complete-pill.done { opacity: 0.55; cursor: default; }

    /* Lesson info */
    #lesson-info { padding: 26px 32px 48px; max-width: 820px; }
    .lesson-kicker {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 11px; border-radius: 9999px;
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      font-size: 0.67rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 10px;
    }
    #lesson-title {
      font-family: 'Instrument Serif', serif; font-style: italic;
      font-size: clamp(1.5rem, 2.8vw, 2.1rem);
      letter-spacing: -0.02em; line-height: 1.18; margin-bottom: 12px;
    }
    #lesson-desc {
      font-size: 0.9rem; line-height: 1.72; color: var(--text-dim);
      max-width: 640px; margin-bottom: 0;
    }
    .divider { height: 1px; background: var(--border); margin: 26px 0; }

    /* Downloads */
    .block-heading {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px;
    }
    #downloads-list { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 28px; }
    .dl-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 15px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border-strong);
      color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.8rem;
      text-decoration: none; transition: background 0.18s, transform 0.18s, border-color 0.18s;
    }
    .dl-pill:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
    .ext-tag {
      font-size: 0.6rem; font-weight: 700; padding: 2px 5px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .ext-json { background: rgba(251,191,36,0.14); color: #fbbf24; }
    .ext-sh   { background: rgba(167,139,250,0.14); color: #a78bfa; }
    .ext-py   { background: rgba(52,211,153,0.14);  color: #34d399; }
    .ext-txt  { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.55); }
    .ext-zip  { background: rgba(249,115,22,0.14);  color: #f97316; }

    /* TXT / Commands */
    .txt-block {
      background: rgba(0,0,0,0.38); border: 1px solid var(--border-strong);
      border-radius: 14px; padding: 18px 22px; margin-bottom: 14px;
    }
    .txt-file-label {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.68rem; font-weight: 500; letter-spacing: 0.06em;
      color: var(--text-muted); margin-bottom: 12px;
    }
    .txt-file-label::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0;
    }
    pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem; line-height: 1.72;
      color: rgba(255,255,255,0.78); white-space: pre-wrap; word-break: break-word;
    }
    .txt-loading { font-size: 0.8rem; color: var(--text-muted); }
    .txt-view-link { color: var(--accent); font-size: 0.8rem; text-decoration: none; }
    .txt-view-link:hover { text-decoration: underline; }

    /* ─── SIDEBAR ───────────────────────────── */
    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      border-left: 1px solid var(--border);
      overflow-y: auto; background: rgba(255,255,255,0.01);
      display: flex; flex-direction: column;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 9999px; }

    .sb-header {
      padding: 18px 18px 14px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
      background: rgba(11,11,13,0.95); backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .sb-label {
      font-size: 0.64rem; font-weight: 600; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
    }
    .sb-bar { height: 3px; background: var(--border); border-radius: 9999px; overflow: hidden; margin-bottom: 7px; }
    .sb-bar-fill {
      height: 100%; border-radius: 9999px;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width 0.45s ease;
    }
    .sb-progress-txt { font-size: 0.7rem; color: var(--text-muted); }
    .sb-progress-txt strong { color: var(--text-dim); }

    .sb-section { border-bottom: 1px solid var(--border); }
    .sb-section-hd {
      padding: 12px 18px 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sb-section-name {
      font-size: 0.67rem; font-weight: 600; letter-spacing: 0.09em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .sb-section-badge {
      font-size: 0.6rem; padding: 2px 7px; border-radius: 9999px;
      background: var(--surface); border: 1px solid var(--border-strong);
      color: var(--text-muted);
    }

    .sb-item {
      display: flex; align-items: center; gap: 11px;
      width: 100%; padding: 11px 18px;
      background: none; border: none; text-align: left; cursor: pointer;
      transition: background 0.14s;
    }
    .sb-item:hover { background: var(--surface); }
    .sb-item.active { background: var(--accent-dim); }
    .sb-item.done .sb-title { color: var(--text-dim); }

    .sb-circle {
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.18s, background 0.18s;
    }
    .sb-item.active .sb-circle { border-color: var(--accent); }
    .sb-item.done .sb-circle { background: var(--green); border-color: var(--green); }

    .sb-body { flex: 1; min-width: 0; }
    .sb-num { font-size: 0.64rem; color: var(--text-muted); margin-bottom: 1px; }
    .sb-title {
      font-size: 0.82rem; font-weight: 400; color: var(--text-dim);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3;
    }
    .sb-item.active .sb-title { color: var(--text); }

    .sb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    /* ─── MOBILE ────────────────────────────── */
    @media (max-width: 780px) {
      #mobile-toggle { display: flex; }
      #main { flex-direction: column; overflow: visible; }
      #content { overflow: visible; }
      #sidebar {
        width: 100%; border-left: none; border-top: 1px solid var(--border);
        max-height: 0; overflow: hidden; transition: max-height 0.34s ease;
      }
      #sidebar.open { max-height: 70vh; overflow-y: auto; }
      #lesson-info { padding: 20px 18px 48px; }
      #lesson-nav { padding: 13px 18px 0; }
      .nav-title, .nav-sep { display: none; }
    }
    @media (max-width: 480px) {
      #nav-user { display: none; }
    }
  </style>
</head>

      </div>

      <div id="lesson-nav">
        <button class="nav-pill" id="btn-prev" onclick="go(-1)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>

        </button>
      </div>

      <div id="lesson-info">

        <div class="divider"></div>

        <div id="downloads-section" style="display:none">
          <div class="block-heading">Resources &amp; Downloads</div>
          <div id="downloads-list"></div>
        </div>

        <div id="commands-section" style="display:none">
          <div class="block-heading">Commands &amp; Notes</div>
          <div id="commands-list"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: SIDEBAR -->
    <aside id="sidebar">

      <div id="sb-body"></div>

  </div>
</div>

const LESSONS = [

/* ─── STATE ────────────────────────────────────────────────────── */
let cur = 0;
let done = [];

/* ─── INIT ─────────────────────────────────────────────────────── */
function init() {
  // Payment gate
  let access;
  try { access = JSON.parse(localStorage.getItem('atreox_course_access') || 'null'); } catch(e) {}
  if (!access || !access.sessionId) {
    document.getElementById('gate').style.display = 'flex';
    return;
  }

  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // User name
  let user;
  try { user = JSON.parse(localStorage.getItem('atreox_cur_v1') || 'null'); } catch(e) {}
  const name = user?.name || access.name || access.email?.split('@')[0] || '';
  if (name) document.getElementById('nav-user').textContent = name.split(' ')[0];

  // Progress
  try { done = JSON.parse(localStorage.getItem('atreox_progress') || '[]'); } catch(e) {}
  if (!Array.isArray(done)) done = [];

  // Last lesson
  const last = parseInt(localStorage.getItem('atreox_last_lesson') || '0', 10);
  cur = Math.min(Math.max(last, 0), LESSONS.length - 1);

  buildSidebar();
  loadLesson(cur);

  // Background session re-verify
  fetch('/api/verify-session?session_id=' + encodeURIComponent(access.sessionId))
    .then(r => r.json())
    .then(d => {
      if (!d.ok) {
        localStorage.removeItem('atreox_course_access');
        document.getElementById('app').style.display = 'none';
        document.getElementById('gate').style.display = 'flex';
      }
    })
    .catch(() => {});
}

/* ─── LOAD LESSON ──────────────────────────────────────────────── */
function loadLesson(idx) {
  cur = idx;
  localStorage.setItem('atreox_last_lesson', idx);

  const L = LESSONS[idx];

  // Video
  document.getElementById('video-player').src =
    'https://drive.google.com/file/d/' + L.videoId + '/preview';

  // Kicker + title + desc
  document.getElementById('lesson-kicker').textContent = (idx + 1) + ' · ' + L.section;
  document.getElementById('lesson-title').textContent = L.title;
  document.getElementById('lesson-desc').textContent = L.desc;

  // Prev / Next
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === LESSONS.length - 1;

  // Complete button
  const isDone = done.includes(idx);
  const btn = document.getElementById('btn-complete');
  const lbl = document.getElementById('complete-label');
  btn.className = isDone ? 'complete-pill done' : 'complete-pill';
  lbl.textContent = isDone ? 'Completed' : 'Mark complete';

  // Downloads
  const dlSec = document.getElementById('downloads-section');
  const dlList = document.getElementById('downloads-list');
  if (L.downloads.length) {
    dlSec.style.display = 'block';
    dlList.innerHTML = L.downloads.map(d => `
      <a class="dl-pill" href="https://drive.google.com/uc?export=download&id=${d.id}" target="_blank" rel="noopener">
        <span class="ext-tag ext-${d.ext}">${d.ext.toUpperCase()}</span>
        ${d.name}
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.45"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      </a>`).join('');
  } else {
    dlSec.style.display = 'none';
  }

  // TXT files
  const cmdSec = document.getElementById('commands-section');
  const cmdList = document.getElementById('commands-list');
  if (L.txts.length) {
    cmdSec.style.display = 'block';
    cmdList.innerHTML = L.txts.map(t => `
      <div class="txt-block" id="txt-${t.id}">
        <div class="txt-file-label">${t.name}</div>
        <div class="txt-loading">Loading…</div>
      </div>`).join('');
    L.txts.forEach(t => loadTxt(t.id, t.name));
  } else {
    cmdSec.style.display = 'none';
  }

  // Scroll content top
  document.getElementById('content').scrollTo({ top: 0, behavior: 'smooth' });

  buildSidebar();
}

/* ─── FETCH TXT ────────────────────────────────────────────────── */
async function loadTxt(fileId, name) {
  const block = document.getElementById('txt-' + fileId);
  if (!block) return;
  const loadEl = block.querySelector('.txt-loading');
  try {
    const res = await fetch('/api/fetch-txt?id=' + fileId);
    if (!res.ok) throw new Error();
    const text = await res.text();
    const pre = document.createElement('pre');
    pre.textContent = text;
    loadEl.replaceWith(pre);
  } catch(_) {
    const a = document.createElement('a');
    a.href = 'https://drive.google.com/file/d/' + fileId + '/view';
    a.target = '_blank'; a.rel = 'noopener';
    a.className = 'txt-view-link';
    a.textContent = 'View ' + name + ' ↗';
    loadEl.replaceWith(a);
  }
}

/* ─── SIDEBAR ──────────────────────────────────────────────────── */
function buildSidebar() {
  const body = document.getElementById('sb-body');
  body.innerHTML = '';
  LESSONS.forEach((L, i) => {
    const isDone = done.includes(i);
    const isActive = i === cur;
    const sec = document.createElement('div');
    sec.className = 'sb-section';
    sec.innerHTML = `
      <div class="sb-section-hd">
        <span class="sb-section-name">${L.section}</span>
        <span class="sb-section-badge">${isDone ? '✓ done' : '1 lesson'}</span>
      </div>
      <button class="sb-item${isActive ? ' active' : ''}${isDone ? ' done' : ''}" onclick="selectLesson(${i})">
        <div class="sb-circle">
          ${isDone ? '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
        </div>
        <div class="sb-body">
          <div class="sb-num">Lesson ${i + 1}</div>
          <div class="sb-title">${L.title}</div>
        </div>
        ${isActive ? '<div class="sb-dot"></div>' : ''}
      </button>`;
    body.appendChild(sec);
  });

  // Update progress
  const count = done.length;
  document.getElementById('progress-label').textContent = count + ' / ' + LESSONS.length;
  document.getElementById('sb-done').textContent = count;
  document.getElementById('sb-fill').style.width = Math.round(count / LESSONS.length * 100) + '%';
}

/* ─── ACTIONS ──────────────────────────────────────────────────── */
function go(dir) {
  const next = cur + dir;
  if (next >= 0 && next < LESSONS.length) loadLesson(next);
}

function selectLesson(idx) {
  loadLesson(idx);
  document.getElementById('sidebar').classList.remove('open');
}

function toggleDone() {
  if (done.includes(cur)) {
    done = done.filter(i => i !== cur);
  } else {
    done.push(cur);
  }
  localStorage.setItem('atreox_progress', JSON.stringify(done));
  loadLesson(cur);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

init();
</script>
</body>
</html>
