<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ATREOX mark: the letter A as a constellation of linked nodes,
       echoing the site's particle-network backdrop. -->
  <rect x="1" y="1" width="62" height="62" rx="14" fill="#04080c"/>
  <rect x="1" y="1" width="62" height="62" rx="14" fill="none" stroke="#00d9ff" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- legs -->
  <path d="M32 14 L15 50 M32 14 L49 50" stroke="#00d9ff" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- crossbar -->
  <path d="M20.7 38 L43.3 38" stroke="#00d9ff" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- apex halo + node -->
  <circle cx="32" cy="14" r="7" fill="#00d9ff" opacity="0.22"/>
  <circle cx="32" cy="14" r="3.8" fill="#7de9ff"/>
  <!-- foot nodes -->
  <circle cx="15" cy="50" r="3" fill="#00d9ff"/>
  <circle cx="49" cy="50" r="3" fill="#00d9ff"/>
  <!-- crossbar joints -->
  <circle cx="20.7" cy="38" r="2.8" fill="#00d9ff" opacity="0.85"/>
  <circle cx="43.3" cy="38" r="2.8" fill="#00d9ff" opacity="0.85"/>
</svg>
